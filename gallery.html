<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery | Portfolio</title>
    
    <!-- Meta SEO -->
    <meta name="description" content="Explore my photo gallery, workspace setups, design concepts, and work highlights.">
    <meta name="author" content="Portfolio User">
    
    <!-- CSS Styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

    <!-- Header Navigation -->
    <header class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                    <polyline points="2 17 12 22 22 17"></polyline>
                    <polyline points="2 12 12 17 22 12"></polyline>
                </svg>
                <span>Portfolio</span>
            </a>
            
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="resume.html">Resume</a></li>
                    <li><a href="certificates.html">Certificates</a></li>
                    <li><a href="gallery.html">Gallery</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
            
            <button class="nav-toggle" aria-label="Toggle navigation Menu">
                &#9776;
            </button>
        </div>
    </header>

    <main class="container">
        <div class="section-header">
            <h1 class="section-title">Photo <span>Gallery</span></h1>
            <p class="section-subtitle">Visual highlights of my projects, workspace setups, and developer life.</p>
        </div>

        <div class="gallery-grid" id="gallery-grid-container">
            <!-- Loaded dynamically -->
        </div>

        <!-- Lightbox Modal -->
        <div class="modal" id="gallery-lightbox">
            <span class="modal-close">&times;</span>
            <img class="modal-content modal-img" src="" alt="">
            <div class="modal-caption"></div>
        </div>
    </main>

    <!-- Footer Section -->
    <footer class="footer">
        <div class="footer-container">
            <p>&copy; 2026. All rights reserved.</p>
            <p>Powered by HTML & JSON API</p>
        </div>
    </footer>

    <!-- Client Script -->
    <script src="js/script.js"></script>
    <script>
        document.addEventListener('profileLoaded', (e) => {
            const data = e.detail;
            document.title = `Gallery | ${data.profile.full_name}`;
        });

        // Load gallery photos
        fetch('api.php?get=gallery')
            .then(res => res.json())
            .then(data => {
                const grid = document.getElementById('gallery-grid-container');
                if (data.success && data.gallery.length > 0) {
                    grid.innerHTML = '';
                    data.gallery.forEach(item => {
                        grid.innerHTML += `
                            <div class="gallery-item glass-panel">
                                <img src="${item.image_path}" alt="${item.title || 'Gallery Image'}" loading="lazy">
                                <div class="gallery-overlay">
                                    <div class="gallery-title">${item.title || 'View Image'}</div>
                                </div>
                            </div>
                        `;
                    });

                    // Re-bind click event to newly created gallery items for lightbox support
                    initLightboxEvents();
                } else {
                    grid.innerHTML = `
                        <div class="glass-panel" style="padding: 60px; text-align: center; color: var(--text-muted); width: 100%; grid-column: 1 / -1;">
                            <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" style="margin-bottom: 20px; color: var(--primary);">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                <polyline points="21 15 16 10 5 21"></polyline>
                            </svg>
                            <h3 style="font-family: var(--font-heading); margin-bottom: 10px;">No Photos Uploaded</h3>
                            <p>I am currently compiling photos for my gallery. Please visit again later.</p>
                        </div>
                    `;
                }
            })
            .catch(err => console.error("Error loading gallery:", err));

        function initLightboxEvents() {
            const galleryItems = document.querySelectorAll('.gallery-item');
            const modal = document.getElementById('gallery-lightbox');
            const modalImg = modal.querySelector('.modal-img');
            const modalCaption = modal.querySelector('.modal-caption');
            const modalClose = modal.querySelector('.modal-close');

            galleryItems.forEach(item => {
                item.addEventListener('click', () => {
                    const img = item.querySelector('img');
                    const title = item.querySelector('.gallery-title');
                    
                    modal.style.display = 'flex';
                    modalImg.src = img.src;
                    modalCaption.textContent = title ? title.textContent : '';
                });
            });

            const closeModal = () => {
                modal.style.display = 'none';
                modalImg.src = '';
                modalCaption.textContent = '';
            };

            if (modalClose) {
                modalClose.addEventListener('click', closeModal);
            }

            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    closeModal();
                }
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modal.style.display === 'flex') {
                    closeModal();
                }
            });
        }
    </script>
</body>
</html>
